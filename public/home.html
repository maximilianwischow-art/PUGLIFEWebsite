<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PUG LIFE BALANCE · Raid Performance</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preload" as="image" href="/responsive/plb-hero-banner-960w.webp" imagesrcset="/responsive/plb-hero-banner-480w.webp 480w, /responsive/plb-hero-banner-768w.webp 768w, /responsive/plb-hero-banner-960w.webp 960w" imagesizes="(max-width: 960px) 100vw, 960px" type="image/webp" fetchpriority="high" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@300;400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.min.css?v=20260625plb-t5-one-night-v1" />
    <link rel="stylesheet" href="/tailwind.css?v=20260506tw1" />
    <style>
      .raidperf-shell {
        border-color: rgba(168, 85, 247, 0.24);
        background: linear-gradient(180deg, rgba(30, 24, 48, 0.92), rgba(18, 14, 30, 0.94));
      }
      .raidperf-card-stack {
        display: grid;
        gap: 12px;
      }
    </style>
  </head>
  <body class="framework-bg-vivid">
    <div class="stars" id="stars" aria-hidden="true"></div>
    <div class="app-wrap">
      <header class="hero">
        <div class="hero-brand">
          <h1 class="visually-hidden">PUG LIFE BALANCE</h1>
          <img
            class="hero-banner"
            src="/plb-hero-banner.png"
            srcset="/responsive/plb-hero-banner-480w.webp 480w, /responsive/plb-hero-banner-768w.webp 768w, /responsive/plb-hero-banner-960w.webp 960w"
            alt=""
            width="1024"
            height="409"
            decoding="async" loading="eager" fetchpriority="high" sizes="(max-width: 960px) 100vw, 960px"
          />
        </div>
        <p class="hero-sub">OG PUG Thunderstrike EU</p>
        <nav class="top-nav" aria-label="Main">
          <a href="/join.html">Join Us</a>
          <a href="/home.html" class="nav-current" aria-current="page" title="Raid performance &amp; attendance">Performance</a>
          <a href="/leaderboard">Leaderboard</a>
          <a href="/voting.html" title="Hall of Fame">HoF</a>
        </nav>
        <div class="auth-top-right" data-auth-widget></div>
        <div class="hero-divider" aria-hidden="true"></div>
      </header>

      <main class="container">
        <div id="welcomePopupBackdrop" class="welcome-popup-backdrop" hidden></div>
        <section id="welcomePopupCard" class="welcome-popup-card" role="dialog" aria-modal="true" aria-labelledby="welcomePopupTitle" hidden>
          <img
            class="welcome-popup-img"
            src="/welcome-popup-hyjal.png"
            srcset="/responsive/welcome-popup-hyjal-480w.webp 480w, /responsive/welcome-popup-hyjal-960w.webp 960w"
            alt=""
            width="1600"
            height="900"
            decoding="async" loading="lazy" fetchpriority="low" sizes="min(94vw, 980px)"
          />
          <button type="button" id="welcomePopupClose" class="welcome-popup-close" aria-label="Close welcome popup">×</button>
          <div class="welcome-popup-copy">
            <h2 id="welcomePopupTitle" class="welcome-popup-title">Welcome to our lair, Friend!</h2>
            <button type="button" id="welcomePopupEnter" class="welcome-popup-enter">Enter</button>
          </div>
        </section>

        <section
          id="phase2RaidOverviewHost"
          class="card tw-plb-card raidperf-shell plb-raid-overview-host"
          role="region"
          aria-label="Phase 2 raid overview"
        ></section>

        <section class="card tw-plb-card raidperf-shell raid-calendar-card" aria-labelledby="raid-calendar-title">
          <h2 id="raid-calendar-title" class="section-title">Raid calendar</h2>
          <p class="subtle raid-cal-intro">Latest 20 logs per raid tier (newest first).</p>
          <div id="raidCalendarGrid" class="raid-cal raid-cal--columns" aria-live="polite">
            <div class="subtle">Loading…</div>
          </div>
        </section>

        <div id="raidDayBackdrop" class="raid-day-backdrop" hidden></div>
        <div
          id="raidDayModal"
          class="raid-day-modal"
          role="dialog"
          aria-modal="true"
          aria-labelledby="raidDayModalTitle"
          hidden
        >
          <button type="button" id="raidDayModalClose" class="raid-day-close" aria-label="Close">×</button>
          <h3 id="raidDayModalTitle" class="raid-day-modal-title"></h3>
          <div id="raidDayModalBody" class="raid-day-modal-body"></div>
        </div>

        <dialog id="plbRoDetailDialog" class="plb-ro-modal">
          <form method="dialog" class="plb-ro-modal-head">
            <h3 class="plb-ro-modal-title" id="plbRoDetailTitle">Raid details</h3>
            <button type="submit" class="plb-ro-modal-close" id="plbRoDetailClose" aria-label="Close raid details">
              Close
            </button>
          </form>
          <div class="plb-ro-modal-body" id="plbRoDetailBody"></div>
        </dialog>

        <section id="status" class="status"></section>
      </main>

      <footer class="footer">
        <div class="dots" aria-hidden="true">
          <span class="dot"></span><span class="dot big"></span><span class="dot"></span>
        </div>
        <p><em>"PUG LIFE BALANCE - We are PUG!"</em></p>
        <p class="footer-sub">TBC Classic · EU - Thunderstrike</p>
        <p class="footer-legal-links">
          <a href="/privacy.html">Privacy</a> · <a href="/imprint.html">Imprint</a> ·
          <a href="/join.html?unsubscribe_dm=1">Unsubscribe</a>
        </p>
      </footer>
    </div>

    <script defer src="/session-api-cache.js?v=20260522plb-overview-cache-v1"></script>
    <script defer src="/app.js?v=20260522plb-performance-event-import-v1"></script>
    <script defer src="/raid-overview.js?v=20260625plb-t5-one-night-v1"></script>
    <script defer src="/home.js?v=20260505black1"></script>
    <script defer src="/auth-ui.js?v=20260518plb-nav-compact-v1"></script>
    <script defer src="/cookie-notice.js?v=20260507mobile1"></script>
  </body>
</html>
