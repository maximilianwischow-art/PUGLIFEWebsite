<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PUG LIFE BALANCE · Raid Leaderboard</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preload" as="image" href="/responsive/plb-hero-banner-960w.webp" imagesrcset="/responsive/plb-hero-banner-480w.webp 480w, /responsive/plb-hero-banner-768w.webp 768w, /responsive/plb-hero-banner-960w.webp 960w" imagesizes="(max-width: 960px) 100vw, 960px" type="image/webp" fetchpriority="high" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@300;400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.min.css?v=20260612plb-lb-badge-summary-chip-v1" />
    <link rel="stylesheet" href="/tailwind.css?v=20260506tw1" />
    <style>
      .leaderboard-controls {
        position: sticky;
        top: 8px;
        z-index: 5;
        display: grid;
        gap: 8px;
        margin-bottom: 10px;
        padding: 10px;
        border: 1px solid rgba(168, 85, 247, 0.18);
        border-radius: 12px;
        background: rgba(20, 14, 33, 0.9);
        backdrop-filter: blur(8px);
      }
      .leaderboard-table thead th {
        position: sticky;
        top: 108px;
        z-index: 4;
      }
      @media (max-width: 900px) {
        .leaderboard-table {
          min-width: 0;
        }
        .leaderboard-table thead {
          display: none;
        }
        .leaderboard-table tbody,
        .leaderboard-table tr,
        .leaderboard-table td {
          display: block;
          width: 100%;
        }
        .leaderboard-row-leader {
          border-bottom: 1px solid rgba(255, 255, 255, 0.08);
          padding: 8px;
        }
        .leaderboard-row-leader .leaderboard-td-player,
        .leaderboard-row-leader .leaderboard-td-badges {
          min-width: 0;
          width: 100%;
          padding: 6px 6px 2px;
        }
        .leaderboard-row-leader .leaderboard-player-row {
          flex-direction: row;
          align-items: center;
        }
        .leaderboard-row-leader .leaderboard-kpi-inline {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 4px 8px;
        }
      }
    </style>
  </head>
  <body class="framework-bg-vivid">
    <div class="stars" id="stars" aria-hidden="true"></div>
    <div class="app-wrap">
      <header class="hero">
        <div class="hero-brand">
          <h1 class="visually-hidden">PUG LIFE BALANCE · Raid Leaderboard</h1>
          <img
            class="hero-banner"
            src="/plb-hero-banner.png"
            srcset="/responsive/plb-hero-banner-480w.webp 480w, /responsive/plb-hero-banner-768w.webp 768w, /responsive/plb-hero-banner-960w.webp 960w"
            alt=""
            width="1024"
            height="409"
            decoding="async" loading="eager" fetchpriority="high" sizes="(max-width: 960px) 100vw, 960px"
          />
        </div>
        <p class="hero-sub">OG PUG Thunderstrike EU</p>
        <nav class="top-nav" aria-label="Main">
          <a href="/join.html">Join Us</a>
          <a href="/home.html" title="Raid performance &amp; attendance">Performance</a>
          <a href="/leaderboard" class="nav-current" aria-current="page">Leaderboard</a>
          <a href="/voting.html" title="Hall of Fame">HoF</a>
        </nav>
        <div class="auth-top-right" data-auth-widget></div>
        <div class="hero-divider" aria-hidden="true"></div>
      </header>

      <main class="container">
        <div id="welcomePopupBackdrop" class="welcome-popup-backdrop" hidden></div>
        <section
          id="welcomePopupCard"
          class="welcome-popup-card"
          role="dialog"
          aria-modal="true"
          aria-labelledby="welcomePopupTitle"
          hidden
        >
          <img
            class="welcome-popup-img"
            src="/welcome-popup-hyjal.png"
            srcset="/responsive/welcome-popup-hyjal-480w.webp 480w, /responsive/welcome-popup-hyjal-960w.webp 960w"
            alt=""
            width="1600"
            height="900"
            decoding="async" loading="lazy" fetchpriority="low" sizes="min(94vw, 980px)"
          />
          <button type="button" id="welcomePopupClose" class="welcome-popup-close" aria-label="Close welcome popup">
            ×
          </button>
          <div class="welcome-popup-copy">
            <h2 id="welcomePopupTitle" class="welcome-popup-title">Welcome to our lair, Friend!</h2>
            <button type="button" id="welcomePopupEnter" class="welcome-popup-enter">Enter</button>
          </div>
        </section>

        <section class="card surface-elevated leaderboard-page-card" aria-labelledby="leaderboard-page-title">
          <h2 id="leaderboard-page-title" class="section-title">Raid Leaderboard</h2>
          <div class="leaderboard-controls">
            <div id="leaderboardSortBar" class="leaderboard-sort-bar" role="group" aria-label="Leaderboard sorting">
              <button type="button" class="leaderboard-sort-chip" data-leaderboard-sort="raidRank">Role</button>
              <button type="button" class="leaderboard-sort-chip" data-leaderboard-sort="attendanceRate">Attendance</button>
              <button type="button" class="leaderboard-sort-chip" data-leaderboard-sort="pastRhEvents">Events</button>
              <button type="button" class="leaderboard-sort-chip" data-leaderboard-sort="deaths">Deaths</button>
              <button type="button" class="leaderboard-sort-chip" data-leaderboard-sort="peakParse">Peak Parse</button>
              <button type="button" class="leaderboard-sort-chip" data-leaderboard-sort="name">Name</button>
            </div>
          </div>
          <div class="leaderboard-table-scroll">
            <table class="leaderboard-table" id="leaderboardTable">
              <thead>
                <tr>
                  <th scope="col">Raider · KPIs</th>
                  <th scope="col">Badges</th>
                </tr>
              </thead>
              <tbody id="leaderboardTableBody">
                <tr>
                  <td colspan="2" class="subtle">Loading…</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>

      <footer class="footer">
        <div class="dots" aria-hidden="true">
          <span class="dot"></span><span class="dot big"></span><span class="dot"></span>
        </div>
        <p><em>"PUG LIFE BALANCE - We are PUG!"</em></p>
        <p class="footer-sub">TBC Classic · EU - Thunderstrike</p>
        <p class="footer-legal-links">
          <a href="/privacy.html">Privacy</a> · <a href="/imprint.html">Imprint</a> ·
          <a href="/join.html?unsubscribe_dm=1">Unsubscribe</a>
        </p>
      </footer>
    </div>

    <script defer src="/session-api-cache.js?v=20260504a"></script>
    <script defer src="/gear-audit-display.js?v=20260519plb-gear-compact-v1"></script>
    <script defer src="/events-roster-ui.js?v=20260612plb-guild-badge-icon-fix-v1"></script>
    <script defer src="/badge-catalog-ui.js?v=20260612plb-guild-badge-icon-fix-v1"></script>
    <script defer src="/leaderboard.js?v=20260612plb-lb-row-badge-order-v1"></script>
    <script defer src="/home.js?v=20260505black1"></script>
    <script defer src="/auth-ui.js?v=20260518plb-nav-compact-v1"></script>
    <script defer src="/cookie-notice.js?v=20260507mobile1"></script>
  </body>
</html>
