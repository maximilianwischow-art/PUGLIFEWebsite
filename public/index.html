<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PUG LIFE BALANCE · Raid Leaderboard</title>
    <link rel="icon" href="/pug-life-balance-logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@300;400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260524e" />
  </head>
  <body>
    <div class="stars" id="stars" aria-hidden="true"></div>
    <div class="app-wrap">
      <header class="hero">
        <div class="hero-brand">
          <h1 class="visually-hidden">PUG LIFE BALANCE · Raid Leaderboard</h1>
          <img
            class="hero-banner"
            src="/plb-hero-banner.png"
            alt=""
            width="1024"
            height="409"
            decoding="async"
          />
        </div>
        <p class="hero-sub">OG PUG Thunderstrike EU</p>
        <nav class="top-nav" aria-label="Main">
          <a href="/home.html">Raid Performance</a>
          <a href="/" class="nav-current" aria-current="page">Leaderboard</a>
          <a href="/voting.html">Hall of Fame</a>
          <a href="/events.html">Future Events</a>
          <a href="/p2-preparation.html">Phase 2</a>
        </nav>
        <div class="auth-top-right" data-auth-widget></div>
        <div class="hero-divider" aria-hidden="true"></div>
      </header>

      <main class="container">
        <div id="welcomePopupBackdrop" class="welcome-popup-backdrop" hidden></div>
        <section
          id="welcomePopupCard"
          class="welcome-popup-card"
          role="dialog"
          aria-modal="true"
          aria-labelledby="welcomePopupTitle"
          hidden
        >
          <img
            class="welcome-popup-img"
            src="/welcome-popup-hyjal.png"
            alt=""
            width="1600"
            height="900"
            decoding="async"
          />
          <button type="button" id="welcomePopupClose" class="welcome-popup-close" aria-label="Close welcome popup">
            ×
          </button>
          <div class="welcome-popup-copy">
            <h2 id="welcomePopupTitle" class="welcome-popup-title">Welcome to our lair, Friend!</h2>
            <button type="button" id="welcomePopupEnter" class="welcome-popup-enter">Enter</button>
          </div>
        </section>

        <section class="card leaderboard-page-card" aria-labelledby="leaderboard-page-title">
          <h2 id="leaderboard-page-title" class="section-title">Raid Leaderboard</h2>
          <div class="leaderboard-table-scroll">
            <table class="leaderboard-table" id="leaderboardTable">
              <thead>
                <tr>
                  <th scope="col">
                    <button type="button" class="leaderboard-sort" data-leaderboard-sort="name">
                      <span class="leaderboard-sort-label">Raider</span><span class="leaderboard-sort-dir" aria-hidden="true"></span>
                    </button>
                  </th>
                  <th scope="col">
                    <button type="button" class="leaderboard-sort" data-leaderboard-sort="raidRank">
                      <span class="leaderboard-sort-label">Raid rank</span><span class="leaderboard-sort-dir" aria-hidden="true"></span>
                    </button>
                  </th>
                  <th scope="col">
                    <button
                      type="button"
                      class="leaderboard-sort"
                      data-leaderboard-sort="attendanceRate"
                      title="Sort by attendance % (last tracked 25-player raids — see row tooltip)"
                    >
                      <span class="leaderboard-sort-label">Attendance %</span><span class="leaderboard-sort-dir" aria-hidden="true"></span>
                    </button>
                  </th>
                  <th scope="col">
                    <button
                      type="button"
                      class="leaderboard-sort"
                      data-leaderboard-sort="pastRhEvents"
                      title="Sort by total Raid Helper events (primary signups) in scanned history"
                    >
                      <span class="leaderboard-sort-label">Events</span><span class="leaderboard-sort-dir" aria-hidden="true"></span>
                    </button>
                  </th>
                  <th scope="col">
                    <button type="button" class="leaderboard-sort" data-leaderboard-sort="deaths">
                      <span class="leaderboard-sort-label">Deaths</span><span class="leaderboard-sort-dir" aria-hidden="true"></span>
                    </button>
                  </th>
                  <th scope="col">
                    <button type="button" class="leaderboard-sort" data-leaderboard-sort="peakParse">
                      <span class="leaderboard-sort-label">Peak parse</span><span class="leaderboard-sort-dir" aria-hidden="true"></span>
                    </button>
                  </th>
                </tr>
              </thead>
              <tbody id="leaderboardTableBody">
                <tr>
                  <td colspan="6" class="subtle">Loading…</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>

      <footer class="footer">
        <div class="dots" aria-hidden="true">
          <span class="dot"></span><span class="dot big"></span><span class="dot"></span>
        </div>
        <p><em>"PUG LIFE BALANCE - We are PUG!"</em></p>
        <p class="footer-sub">TBC Classic · EU - Thunderstrike</p>
        <p class="footer-legal-links"><a href="/privacy.html">Privacy</a> · <a href="/imprint.html">Imprint</a></p>
      </footer>
    </div>

    <script src="/session-api-cache.js?v=20260504a"></script>
    <script src="/events-roster-ui.js?v=20260504a"></script>
    <script src="/wow-item-tooltip.js?v=20260428p"></script>
    <script src="/leaderboard.js?v=20260504b"></script>
    <script src="/home.js?v=20260523a"></script>
    <script src="/auth-ui.js?v=20260504a"></script>
    <script src="/cookie-notice.js?v=20260428p"></script>
  </body>
</html>
